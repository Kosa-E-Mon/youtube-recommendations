<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>YouTube選別ダッシュボード</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f2f5; color: #333; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 600px; margin: auto; }
        .hidden { display: none; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background: #1557b0; }
        .channel-item { display: flex; align-items: center; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
        .channel-info { display: flex; align-items: center; }
        .channel-thumb { width: 40px; height: 40px; border-radius: 50%; margin-right: 12px; }
        .tag-area select { padding: 5px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="card">
    <!-- 1. 初期設定画面（初回のみ表示） -->
    <div id="setup-view" class="hidden">
        <h2>🔧 初期設定</h2>
        <p>Google Cloudで取得した情報を入力してください。この情報はあなたのブラウザのみに保存されます。</p>
        <input type="text" id="input-api-key" placeholder="YouTube API Key">
        <input type="text" id="input-client-id" placeholder="OAuth Client ID">
        <button onclick="saveSettings()">設定を保存して開始</button>
    </div>

    <!-- 2. メイン操作画面 -->
    <div id="main-view" class="hidden">
        <h2>📺 登録チャンネル棚卸し</h2>
        <p id="user-status">未ログイン</p>
        <button id="auth-btn" onclick="handleAuthClick()">Googleアカウントで同期</button>
        <div id="channel-list" style="margin-top: 20px;"></div>
        <button onclick="clearSettings()" style="margin-top: 20px; background: #666;">設定をリセット</button>
    </div>
</div>

<script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
<script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>

<script>
    let SETTINGS = JSON.parse(localStorage.getItem('yt_filter_settings')) || null;
    let tokenClient;

    // 起動時に設定があるかチェック
    window.onload = () => {
        if (!SETTINGS) {
            document.getElementById('setup-view').classList.remove('hidden');
        } else {
            document.getElementById('main-view').classList.remove('hidden');
        }
    };

    function saveSettings() {
        const apiKey = document.getElementById('input-api-key').value;
        const clientId = document.getElementById('input-client-id').value;
        if (!apiKey || !clientId) return alert('両方入力してください');

        SETTINGS = { apiKey, clientId };
        localStorage.setItem('yt_filter_settings', JSON.stringify(SETTINGS));
        location.reload(); // 再読み込みして反映
    }

    function clearSettings() {
        if (confirm('設定をリセットしますか？')) {
            localStorage.removeItem('yt_filter_settings');
            location.reload();
        }
    }

    // Google API 初期化系
    function gapiLoaded() { gapi.load('client', async () => {
        if (SETTINGS) {
            await gapi.client.init({
                apiKey: SETTINGS.apiKey,
                discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/youtube/v3/rest'],
            });
        }
    }); }

    function gisLoaded() {
        if (SETTINGS) {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: SETTINGS.clientId,
                scope: 'https://www.googleapis.com/auth/youtube.readonly',
                callback: (resp) => { if (resp.access_token) listSubscriptions(); }
            });
        }
    }

    function handleAuthClick() {
        tokenClient.requestAccessToken({prompt: 'consent'});
    }

    async function listSubscriptions() {
        const response = await gapi.client.youtube.subscriptions.list({
            part: 'snippet',
            mine: true,
            maxResults: 50
        });

        const listDiv = document.getElementById('channel-list');
        listDiv.innerHTML = '<h3>登録チャンネル一覧</h3>';
        
        response.result.items.forEach(item => {
            const snip = item.snippet;
            const div = document.createElement('div');
            div.className = 'channel-item';
            div.innerHTML = `
                <div class="channel-info">
                    <img src="${snip.thumbnails.default.url}" class="channel-thumb">
                    <span>${snip.title}</span>
                </div>
                <div class="tag-area">
                    <select onchange="saveTag('${item.id}', this.value)">
                        <option value="">未分類</option>
                        <option value="S">S: 快適</option>
                        <option value="A">A: 内容のみ</option>
                        <option value="C">C: ブロック</option>
                    </select>
                </div>
            `;
            listDiv.appendChild(div);
        });
        document.getElementById('auth-btn').innerText = 'リスト更新';
    }

    function saveTag(id, tag) {
        // ここにタグ保存ロジック（LocalStorageやGoogleドライブ）を入れる
        console.log(`Saved: ${id} as ${tag}`);
    }
</script>

</body>
</html>
